<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a3060" stroke-width="0.5" opacity="0.35"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circles right side -->
  <circle cx="980" cy="315" r="280" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.07"/>
  <circle cx="980" cy="315" r="200" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.07"/>
  <circle cx="980" cy="315" r="120" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#gold)"/>

  <!-- Left accent line -->
  <rect x="70" y="30" width="3" height="570" fill="url(#blue)" opacity="0.25"/>

  <!-- Live badge -->
  <rect x="90" y="80" width="120" height="35" rx="4" fill="#FF3B30" opacity="0.9"/>
  <text x="150" y="103" font-family="'Arial', sans-serif" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">LIVE</text>

  <!-- Webinar label -->
  <text x="225" y="103" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="#00D4FF" letter-spacing="4">WEBINAR</text>

  <!-- Main headline -->
  <text x="90" y="200" font-family="'Arial Black', 'Arial', sans-serif" font-size="60" font-weight="900" fill="#FFFFFF">White-Label</text>
  <text x="90" y="275" font-family="'Arial Black', 'Arial', sans-serif" font-size="60" font-weight="900" fill="url(#gold)">AI Suite</text>
  <text x="90" y="345" font-family="'Arial Black', 'Arial', sans-serif" font-size="48" font-weight="900" fill="#FFFFFF">— Live Demo</text>

  <!-- Divider -->
  <rect x="90" y="370" width="550" height="2" fill="url(#gold)" opacity="0.5"/>

  <!-- Date -->
  <text x="90" y="410" font-family="'Arial', sans-serif" font-size="24" font-weight="700" fill="#00D4FF" letter-spacing="1">April 4, 2026  |  15:00 CET</text>

  <!-- Host -->
  <text x="90" y="450" font-family="'Arial', sans-serif" font-size="18" font-weight="400" fill="#CCDDFF" opacity="0.85">Hosted by</text>
  <text x="200" y="450" font-family="'Arial', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Wilco Hennink @ The Profit Factory</text>

  <!-- CTA -->
  <rect x="90" y="490" width="320" height="48" rx="5" fill="url(#gold)" opacity="0.12"/>
  <rect x="90" y="490" width="320" height="48" rx="5" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <text x="250" y="520" font-family="'Arial', sans-serif" font-size="16" font-weight="700" fill="#FFD700" text-anchor="middle" letter-spacing="1">FREE — 20 SPOTS ONLY</text>

  <!-- Right side AI visual -->
  <circle cx="980" cy="315" r="80" fill="#00D4FF" opacity="0.04" filter="url(#glow)"/>
  <circle cx="980" cy="315" r="12" fill="#00D4FF" opacity="0.7" filter="url(#glow)"/>
  <line x1="980" y1="195" x2="980" y2="303" stroke="#00D4FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="860" y1="315" x2="968" y2="315" stroke="#00D4FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="992" y1="315" x2="1100" y2="315" stroke="#00D4FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="980" y1="327" x2="980" y2="435" stroke="#FFD700" stroke-width="1.5" opacity="0.25"/>
  <circle cx="980" cy="195" r="5" fill="#00D4FF" opacity="0.6"/>
  <circle cx="860" cy="315" r="5" fill="#FFD700" opacity="0.6"/>
  <circle cx="1100" cy="315" r="5" fill="#00D4FF" opacity="0.6"/>
  <circle cx="980" cy="435" r="5" fill="#FFD700" opacity="0.6"/>

  <!-- Bottom -->
  <rect x="0" y="604" width="1200" height="26" fill="#061020" opacity="0.8"/>
  <text x="600" y="621" font-family="'Arial', sans-serif" font-size="11" fill="#FFFFFF" opacity="0.4" text-anchor="middle" letter-spacing="2">THE PROFIT FACTORY  ·  THEPROFITFACTORY.NL</text>
</svg>
