<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a3060" stroke-width="0.5" opacity="0.35"/>
  </pattern>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <!-- Large decorative circle (center background) -->
  <circle cx="540" cy="540" r="480" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.04"/>
  <circle cx="540" cy="540" r="380" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.04"/>
  <circle cx="540" cy="540" r="280" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.05"/>

  <!-- Corner accents -->
  <rect x="0" y="0" width="5" height="1080" fill="url(#blue)" opacity="0.3"/>
  <rect x="1075" y="0" width="5" height="1080" fill="url(#blue)" opacity="0.3"/>
  <rect x="0" y="0" width="1080" height="5" fill="url(#gold)"/>
  <rect x="0" y="1075" width="1080" height="5" fill="url(#gold)"/>

  <!-- Live badge top center -->
  <rect x="390" y="80" width="300" height="50" rx="6" fill="#FF3B30" opacity="0.9"/>
  <text x="540" y="114" font-family="'Arial', sans-serif" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">LIVE WEBINAR</text>

  <!-- AI visual element - center top -->
  <!-- Orbit ring -->
  <circle cx="540" cy="340" r="140" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.2"/>
  <circle cx="540" cy="340" r="100" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.15"/>
  <!-- Center node -->
  <circle cx="540" cy="340" r="35" fill="#0a1628" stroke="#00D4FF" stroke-width="2" opacity="0.9"/>
  <circle cx="540" cy="340" r="18" fill="#00D4FF" opacity="0.2" filter="url(#glow)"/>
  <circle cx="540" cy="340" r="8" fill="#00D4FF" opacity="0.9" filter="url(#glow)"/>
  <!-- Orbit nodes -->
  <circle cx="540" cy="200" r="7" fill="#FFD700" opacity="0.8" filter="url(#glow)"/>
  <circle cx="680" cy="340" r="7" fill="#00D4FF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="540" cy="480" r="7" fill="#FFD700" opacity="0.8" filter="url(#glow)"/>
  <circle cx="400" cy="340" r="7" fill="#00D4FF" opacity="0.8" filter="url(#glow)"/>
  <!-- Spoke lines -->
  <line x1="540" y1="305" x2="540" y2="207" stroke="#00D4FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="575" y1="340" x2="673" y2="340" stroke="#00D4FF" stroke-width="1.5" opacity="0.3"/>
  <line x1="540" y1="375" x2="540" y2="473" stroke="#FFD700" stroke-width="1.5" opacity="0.3"/>
  <line x1="505" y1="340" x2="407" y2="340" stroke="#FFD700" stroke-width="1.5" opacity="0.3"/>

  <!-- Main headline -->
  <text x="540" y="590" font-family="'Arial Black', 'Arial', sans-serif" font-size="68" font-weight="900" fill="#FFFFFF" text-anchor="middle" filter="url(#textglow)">White-Label</text>
  <text x="540" y="675" font-family="'Arial Black', 'Arial', sans-serif" font-size="68" font-weight="900" fill="url(#gold)" text-anchor="middle">AI Suite</text>
  <text x="540" y="750" font-family="'Arial Black', 'Arial', sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle">— Live Demo</text>

  <!-- Divider -->
  <rect x="190" y="775" width="700" height="2" fill="url(#gold)" opacity="0.5"/>

  <!-- Date -->
  <text x="540" y="820" font-family="'Arial', sans-serif" font-size="28" font-weight="700" fill="#00D4FF" text-anchor="middle" letter-spacing="1">April 4, 2026  |  15:00 CET</text>

  <!-- Host -->
  <text x="540" y="868" font-family="'Arial', sans-serif" font-size="20" font-weight="400" fill="#CCDDFF" text-anchor="middle" opacity="0.85">Wilco Hennink @ The Profit Factory</text>

  <!-- CTA badge -->
  <rect x="215" y="900" width="650" height="62" rx="8" fill="url(#goldbg)"/>
  <rect x="215" y="900" width="650" height="62" rx="8" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <text x="540" y="939" font-family="'Arial', sans-serif" font-size="22" font-weight="800" fill="#FFD700" text-anchor="middle" letter-spacing="1">FREE TO ATTEND — ONLY 20 SPOTS</text>

  <!-- Bottom label -->
  <text x="540" y="1015" font-family="'Arial', sans-serif" font-size="14" fill="#FFFFFF" opacity="0.35" text-anchor="middle" letter-spacing="3">THEPROFITFACTORY.NL</text>
</svg>
